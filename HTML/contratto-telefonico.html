<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Salmon Mobile - Contratti</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="layout-1">

        <aside class="sidebar-filtro">
            <h3>Ricerca</h3>

            <div class="filtro-group">
                <label for="search-numero">Numero</label>
                <input type="text" id="search-numero" placeholder="es. +39 333…" autocomplete="off">
            </div>

            <div class="filtro-group">
                <label for="search-tipo">Tipo</label>
                <select id="search-tipo">
                    <option value="">Tutti</option>
                    <option value="ricarica">Ricarica</option>
                    <option value="consumo">Consumo</option>
                </select>
            </div>

            <div class="filtro-group">
                <label for="search-data-da">Attivazione dal</label>
                <input type="date" id="search-data-da">
            </div>

            <div class="filtro-group">
                <label for="search-data-a">Attivazione al</label>
                <input type="date" id="search-data-a">
            </div>

            <div class="filtro-actions">
                <button id="btn-cerca" class="btn btn-primary btn-block">Cerca</button>
                <button id="btn-reset" class="btn btn-outline btn-block">Reset</button>
            </div>
        </aside>

        <section class="contenuto-risultati">
            <div id="msg-box" style="display:none;"></div>
            
            <h2>Elenco Contratti</h2>
            
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Numero</th>
                            <th>Attivazione</th>
                            <th>Tipo</th>
                            <th>Minuti</th>
                            <th>Credito</th>
                            <th>N. Tel.</th>
                            <th>SIM Attiva</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="tbl-body">
                        </tbody>
                </table>
            </div>
        </section>

        <div id="modal-overlay" class="modal-overlay" style="display:none;">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modal-title">Dettaglio Contratto</h3>
                    <button class="modal-close" id="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
                    
                    <div style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                        <p><strong>Numero:</strong> <span id="d-numero"></span></p>
                        <p><strong>Data:</strong> <span id="d-data"></span></p>
                        <p><strong>Tipo:</strong> <span id="d-tipo"></span></p>
                        <p><strong>Residuo:</strong> <span id="d-residuo"></span></p>
                    </div>

                    <h4 style="margin-top: 15px; border-bottom: 2px solid #FA8072; padding-bottom: 5px;">📞 Telefonate</h4>
                    <div class="table-wrap">
                        <table style="width: 100%; margin-bottom: 15px;">
                            <thead><tr><th>Data</th><th>Ora</th><th>Durata</th><th>Costo</th></tr></thead>
                            <tbody id="body-telefonate"></tbody>
                        </table>
                    </div>

                    <h4 style="margin-top: 15px; border-bottom: 2px solid #1A2421; padding-bottom: 5px;">🟢 SIM Attiva</h4>
                    <div class="table-wrap">
                        <table style="width: 100%; margin-bottom: 15px;">
                            <thead><tr><th>Codice</th><th>Tipo</th><th>Attivazione</th></tr></thead>
                            <tbody id="body-sim-attiva"></tbody>
                        </table>
                    </div>

                    <h4 style="margin-top: 15px; border-bottom: 2px solid #ccc; padding-bottom: 5px;">🔴 SIM Disattive</h4>
                    <div class="table-wrap">
                        <table style="width: 100%;">
                            <thead><tr><th>Codice</th><th>Tipo</th><th>Attivazione</th><th>Disattivazione</th></tr></thead>
                            <tbody id="body-sim-disattive"></tbody>
                        </table>
                    </div>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline" id="btn-chiudi">Chiudi</button>
                </div>
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script src="../JavaScript/contratti.js"></script>
    <script>
        $(function(){
            $("#header-placeholder").load("header.html");
            $("#footer-placeholder").load("footer.html");
        });
    </script>

</body>
</html>
